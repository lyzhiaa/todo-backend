services:
  db:
    image: postgres:18.3
    container_name: todo_postgres_db
    restart: always
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: qwer1234
      POSTGRES_DB: todo_db
    ports:
      - "6400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
volumes:
  postgres_data: